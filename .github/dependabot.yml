version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-patch:
        update-types:
          - patch

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-patch:
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-patch:
        update-types:
          - patch

  - package-ecosystem: docker
    directory: /infra/compose
    schedule:
      interval: weekly
    groups:
      docker-patch:
        update-types:
          - patch
