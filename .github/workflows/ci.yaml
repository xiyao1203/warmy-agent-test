name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.24"
          enable-cache: true
      - run: uv sync --frozen --all-packages --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy apps/control-api/src apps/admin-cli/src
      - run: >-
          uv run pytest
          apps/control-api/tests/unit
          apps/control-api/tests/contract
          apps/control-api/tests/architecture
          apps/admin-cli/tests
      - run: uv run python scripts/check_architecture.py

  python-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.1-alpine
        env:
          POSTGRES_DB: agenttest_test
          POSTGRES_USER: agenttest
          POSTGRES_PASSWORD: agenttest-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenttest -d agenttest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AGENTTEST_TEST_DATABASE_URL: postgresql+asyncpg://agenttest:agenttest-test@localhost:5432/agenttest_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.24"
          enable-cache: true
      - run: uv sync --frozen --all-packages --all-groups
      - run: uv run pytest apps/control-api/tests/integration -v

  web-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @warmy/web lint
      - run: pnpm --filter @warmy/web typecheck
      - run: pnpm --filter @warmy/web test
      - run: pnpm --filter @warmy/web build
      - run: pnpm --filter @warmy/generated-api-client test
      - run: pnpm --filter @warmy/generated-api-client typecheck

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.24"
          enable-cache: true
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: pnpm
      - run: uv sync --frozen --all-packages --all-groups
      - run: pnpm install --frozen-lockfile
      - run: make api-check

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/test_compose_config.sh

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.24"
          enable-cache: true
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: pnpm
      - run: uv sync --frozen --all-packages --all-groups
      - run: pnpm install --frozen-lockfile
      - run: uv run --with pip-audit==2.10.1 pip-audit
      - run: pnpm audit --audit-level high
