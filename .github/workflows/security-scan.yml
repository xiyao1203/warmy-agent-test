# 🔒 Security Scan — Promptfoo + Ruff security rules
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  promptfoo:
    if: false  # 模型 API 就绪后启用
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @warmy/web promptfoo:eval

  ruff-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check --select S apps/control-api/src/
      - run: uv run ruff check --select S workers/api-runner/src/
