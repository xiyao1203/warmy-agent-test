name: warmy-agent-test

services:
  postgresql:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenttest}
      POSTGRES_USER: ${POSTGRES_USER:-agenttest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenttest-local}
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agenttest} -d ${POSTGRES_DB:-agenttest}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4.9-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  temporal:
    image: temporalio/auto-setup:1.29.7
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-agenttest}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-agenttest-local}
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 1C41 /proc/net/tcp"]
      interval: 5s
      timeout: 5s
      retries: 24

  temporal-ui:
    image: temporalio/ui:2.51.1
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_CORS_ORIGINS:-http://localhost:5175}
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agenttest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agenttest-local-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agenttest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agenttest-local-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-agenttest-artifacts}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
    restart: "no"

volumes:
  postgresql-data:
  minio-data:
