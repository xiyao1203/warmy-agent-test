version = 1
revision = 3
requires-python = ">=3.12, <3.14"

[manifest]
members = [
    "warmy-admin-cli",
    "warmy-agent-test-workspace",
    "warmy-control-api",
]

[[package]]
name = "warmy-admin-cli"
version = "0.1.0"
source = { virtual = "apps/admin-cli" }

[[package]]
name = "warmy-agent-test-workspace"
version = "0.1.0"
source = { virtual = "." }

[[package]]
name = "warmy-control-api"
version = "0.1.0"
source = { virtual = "apps/control-api" }
