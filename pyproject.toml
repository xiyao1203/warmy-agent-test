[project]
name = "warmy-agent-test-workspace"
version = "0.1.0"
requires-python = ">=3.12,<3.14"

[tool.uv.workspace]
members = [
  "apps/control-api",
  "apps/admin-cli",
  "workers/api-runner",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]

[tool.pytest.ini_options]
addopts = "-ra"
